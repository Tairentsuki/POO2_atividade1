<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard do Sistema</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/charts/loader.js"></script>
</head>
<body class="bg-gray-100 flex h-screen overflow-hidden">

    <aside class="w-64 bg-slate-800 text-white flex flex-col shadow-lg">
        <div class="p-6 text-2xl font-bold border-b border-slate-700 text-center">
            Painel
        </div>
        <nav class="flex-1 px-4 py-6 space-y-2">
            <a th:href="@{/graficos}" class="block px-4 py-3 bg-blue-600 rounded-lg font-medium transition hover:bg-blue-500">
                Gráficos
            </a>
            <a th:href="@{/estatistica}" class="block px-4 py-3 rounded-lg font-medium transition hover:bg-slate-700">
                Estatística
            </a>
            <a th:href="@{/funcionarios}" class="block px-4 py-3 rounded-lg font-medium transition hover:bg-slate-700">
                Listar Funcionários
            </a>
            <a th:href="@{/pessoas}" class="block px-4 py-3 rounded-lg font-medium transition hover:bg-slate-700">
                Listar Pessoas
            </a>
            <a th:href="@{/setores}" class="block px-4 py-3 rounded-lg font-medium transition hover:bg-slate-700">
                Listar Setores
            </a>
            <a th:href="@{/movimentacoes}" class="block px-4 py-3 rounded-lg font-medium transition hover:bg-slate-700">
                Listar Movimentações
            </a>
        </nav>
    </aside>

    <main class="flex-1 p-8 overflow-y-auto">
        <header class="mb-8">
            <h1 class="text-3xl font-bold text-gray-800">Gestão - Gráficos</h1>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200">
                <div id="grafico_setores" class="w-full h-80"></div>
            </div>

            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200">
                <div id="grafico_salarios" class="w-full h-80"></div>
            </div>

            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200 lg:col-span-2">
                <div id="grafico_crescimento" class="w-full h-80"></div>
            </div>

            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200 lg:col-span-2">
                <div id="grafico_genero" class="w-full h-80"></div>
            </div>

            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200 lg:col-span-2">
                <div id="grafico_financeiro" class="w-full h-80"></div>
            </div>
        </div>
    </main>

    <script th:inline="javascript">
        google.charts.load('current', { packages: ['corechart', 'bar'] });
        google.charts.setOnLoadCallback(desenharGraficos);

        function desenharGraficos() {
            try {
                const setoresDoBanco = /*[[${setoresChartData}]]*/ [];
                const linhasSetores = [ ['Setor', 'Qtd de Funcionarios'] ];
                if (Array.isArray(setoresDoBanco) && setoresDoBanco.length > 0) {
                    setoresDoBanco.forEach(row => linhasSetores.push([String(row[0]), Number(row[1])]));
                } else {
                    linhasSetores.push(['Sem dados', 0]);
                }
                const dataSetores = google.visualization.arrayToDataTable(linhasSetores);
                const optionsSetores = {
                    title: 'Distribuicao de Funcionarios por Setor',
                    pieHole: 0.4,
                    colors: ['#3b82f6', '#10b981', '#f59e0b', '#ef4444'],
                    chartArea: { width: '85%', height: '80%' }
                };
                new google.visualization.PieChart(document.getElementById('grafico_setores')).draw(dataSetores, optionsSetores);
            } catch (e) {
                console.error('Erro no grafico_setores:', e);
            }

            try {
                const salariosDoBanco = /*[[${salariosChartData}]]*/ [];
                const linhasSalarios = [ ['Setor', 'Salário Bruto Médio (R$)'] ];
                if (Array.isArray(salariosDoBanco) && salariosDoBanco.length > 0) {
                    salariosDoBanco.forEach(row => linhasSalarios.push([String(row[0]), Number(row[1])]));
                } else {
                    linhasSalarios.push(['Sem dados', 0]);
                }
                const dataSalarios = google.visualization.arrayToDataTable(linhasSalarios);
                const optionsSalarios = {
                    title: 'Média de Salario Bruto por Setor',
                    colors: ['#6366f1'],
                    legend: { position: 'none' },
                    vAxis: { format: 'currency' }
                };
                new google.visualization.ColumnChart(document.getElementById('grafico_salarios')).draw(dataSalarios, optionsSalarios);
            } catch (e) {
                console.error('Erro no grafico_salarios:', e);
            }

            try {
                const admissoesDoBanco = /*[[${admissoesChartData}]]*/ [];
                const linhasAdmissoes = [ ['Ano', 'Novas Admissoes'] ];
                if (Array.isArray(admissoesDoBanco) && admissoesDoBanco.length > 0) {
                    admissoesDoBanco.forEach(row => linhasAdmissoes.push([String(row[0]), Number(row[1])]));
                } else {
                    linhasAdmissoes.push(['Sem dados', 0]);
                }
                const dataAdmissoes = google.visualization.arrayToDataTable(linhasAdmissoes);
                const optionsAdmissoes = {
                    title: 'Histórico de Admissôes Anual',
                    curveType: 'function',
                    legend: { position: 'bottom' },
                    colors: ['#0ea5e9'],
                    pointSize: 5
                };
                new google.visualization.LineChart(document.getElementById('grafico_crescimento')).draw(dataAdmissoes, optionsAdmissoes);
            } catch (e) {
                console.error('Erro no grafico_crescimento:', e);
            }

            try {
                const generoDoBanco = /*[[${generoChartData}]]*/ [];
                const linhasSexo = [ ['Sexo', 'Quantidade', { role: 'style' }] ];
                const corPorSexo = {
                    feminino: '#ec4899',
                    masculino: '#3b82f6',
                    'nao informado': '#8b5cf6'
                };
                if (Array.isArray(generoDoBanco) && generoDoBanco.length > 0) {
                    generoDoBanco.forEach(row => {
                        const sexo = String(row[0]);
                        const chave = sexo.toLowerCase();
                        const cor = corPorSexo[chave] || '#64748b';
                        linhasSexo.push([sexo, Number(row[1]), cor]);
                    });
                } else {
                    linhasSexo.push(['Sem dados', 0, '#64748b']);
                }
                const dataSexo = google.visualization.arrayToDataTable(linhasSexo);
                const optionsSexo = {
                    title: 'Perfil Demográfico (Sexo)',
                    legend: { position: 'none' },
                    hAxis: { title: 'Quantidade de Pessoas' }
                };
                new google.visualization.BarChart(document.getElementById('grafico_genero')).draw(dataSexo, optionsSexo);
            } catch (e) {
                console.error('Erro no grafico_genero:', e);
            }

            try {
                const financeiroDoBanco = /*[[${financeiroChartData}]]*/ [];
                const linhasFinanceiro = [ ['Setor', 'Receitas', 'Despesas'] ];
                if (Array.isArray(financeiroDoBanco) && financeiroDoBanco.length > 0) {
                    financeiroDoBanco.forEach(row => linhasFinanceiro.push([String(row[0]), Number(row[1]), Number(row[2])]));
                } else {
                    linhasFinanceiro.push(['Sem dados', 0, 0]);
                }
                const dataFinanceiro = google.visualization.arrayToDataTable(linhasFinanceiro);
                const optionsFinanceiro = {
                    chart: {
                        title: 'Receita x Despesa por Setor',
                    },
                    bars: 'horizontal',
                    colors: ['#10b981', '#ef4444'],
                    series: {
                        0: { axis: 'receitas' },
                        1: { axis: 'despesas' }
                    },
                    axes: {
                        x: {
                            receitas: { side: 'bottom', label: 'Receitas (R$)' },
                            despesas: { side: 'top', label: 'Despesas (R$)' }
                        }
                    }
                };
                new google.charts.Bar(document.getElementById('grafico_financeiro'))
                    .draw(dataFinanceiro, google.charts.Bar.convertOptions(optionsFinanceiro));
            } catch (e) {
                console.error('Erro no grafico_financeiro:', e);
            }
        }

        window.addEventListener('resize', desenharGraficos);
    </script>
</body>
</html>
