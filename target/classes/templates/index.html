<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard do Sistema</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://www.gstatic.com/charts/loader.js"></script>
</head>
<body class="bg-gray-100 flex h-screen overflow-hidden">

    <aside class="w-64 bg-slate-800 text-white flex flex-col shadow-lg">
        <div class="p-6 text-2xl font-bold border-b border-slate-700 text-center">
            Painel
        </div>
        <nav class="flex-1 px-4 py-6 space-y-2">
            <a href="#" class="block px-4 py-3 bg-blue-600 rounded-lg font-medium transition hover:bg-blue-500">
                 Gráficos
            </a>
            <a href="#" class="block px-4 py-3 rounded-lg font-medium transition hover:bg-slate-700">
                 Listar Funcionários
            </a>
            <a href="#" class="block px-4 py-3 rounded-lg font-medium transition hover:bg-slate-700">
                 Listar Pessoas
            </a>
            <a href="#" class="block px-4 py-3 rounded-lg font-medium transition hover:bg-slate-700">
                 Listar Setores
            </a>
        </nav>
    </aside>

    <main class="flex-1 p-8 overflow-y-auto">
        <header class="mb-8">
            <h1 class="text-3xl font-bold text-gray-800">Gestãos  - Gráficos</h1>
            <p class="text-gray-500">Acompanhamento de métricas do sistema</p>
        </header>

<div class="bg-white p-5 rounded-xl shadow-sm border border-gray-200 mb-8 flex flex-col lg:flex-row gap-6 justify-between">
            
            <div class="flex-1 lg:border-r border-gray-200 lg:pr-6">
                <h2 class="text-base font-semibold text-gray-700 mb-3">Importar Dados</h2>
                <form class="flex flex-col sm:flex-row gap-3 items-center">
                    <input type="file" accept=".csv,.json,.xml" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer" />
                    
                    <select class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2 w-full sm:w-auto">
                        <option value="csv">CSV</option>
                        <option value="json">JSON</option>
                        <option value="xml">XML</option>
                    </select>
                    
                    <button type="button" class="bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-lg text-sm transition-colors w-full sm:w-auto">
                        Importar
                    </button>
                </form>
            </div>

            <div class="flex-1 lg:pl-6">
                <h2 class="text-base font-semibold text-gray-700 mb-3">Exportar Relatório</h2>
                <form class="flex flex-col sm:flex-row gap-3 items-center">
                    <select class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2 w-full sm:w-auto">
                        <option value="csv">Exportar como CSV</option>
                        <option value="json">Exportar como JSON</option>
                        <option value="xml">Exportar como XML</option>
                    </select>
                    
                    <button type="button" class="bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-2 px-4 rounded-lg text-sm transition-colors w-full sm:w-auto">
                        Exportar
                    </button>
                </form>
            </div>
            
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            
            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200">
                <div id="grafico_setores" class="w-full h-80"></div>
            </div>
            
            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200">
                <div id="grafico_salarios" class="w-full h-80"></div>
            </div>

            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200 lg:col-span-2">
                <div id="grafico_crescimento" class="w-full h-80"></div>
            </div>

        </div>
    </main>

    <script>
        // Carrega os pacotes básicos do Google Charts
        google.charts.load('current', {'packages':['corechart']});
        // Define qual função chamar quando a API terminar de carregar
        google.charts.setOnLoadCallback(desenharGraficos);

        function desenharGraficos() {
            
            // --- 1. Gráfico de Rosca (Funcionários por Setor) ---
            const dataSetores = google.visualization.arrayToDataTable([
                ['Setor', 'Quantidade'],
                ['Tecnologia', 12],
                ['Recursos Humanos', 4],
                ['Vendas', 8],
                ['Administrativo', 5]
            ]);

            const optionsSetores = {
                title: 'Distribuição de Funcionários',
                pieHole: 0.4, // Transforma a pizza em rosca
                colors: ['#3b82f6', '#10b981', '#f59e0b', '#ef4444'],
                chartArea: {width: '80%', height: '80%'}
            };

            const chartSetores = new google.visualization.PieChart(document.getElementById('grafico_setores'));
            chartSetores.draw(dataSetores, optionsSetores);


            // --- 2. Gráfico de Colunas (Média Salarial) ---
            const dataSalarios = google.visualization.arrayToDataTable([
                ['Setor', 'Média (R$)'],
                ['Tecnologia', 7500],
                ['RH', 4200],
                ['Vendas', 5800],
                ['Admin', 3900]
            ]);

            const optionsSalarios = {
                title: 'Média Salarial por Setor',
                colors: ['#6366f1'],
                legend: { position: 'none' },
                vAxis: { format: 'currency' }
            };

            const chartSalarios = new google.visualization.ColumnChart(document.getElementById('grafico_salarios'));
            chartSalarios.draw(dataSalarios, optionsSalarios);


            // --- 3. Gráfico de Linhas (Crescimento/Contratações) ---
            const dataCrescimento = google.visualization.arrayToDataTable([
                ['Mês', 'Contratações'],
                ['Jan',  3],
                ['Fev',  6],
                ['Mar',  4],
                ['Abr',  9],
                ['Mai',  5],
                ['Jun',  8]
            ]);

            const optionsCrescimento = {
                title: 'Evolução de Contratações no Semestre',
                curveType: 'function',
                legend: { position: 'bottom' },
                colors: ['#0ea5e9']
            };

            const chartCrescimento = new google.visualization.LineChart(document.getElementById('grafico_crescimento'));
            chartCrescimento.draw(dataCrescimento, optionsCrescimento);

                var data = google.visualization.arrayToDataTable([
                    ['Element', 'Density', { role: 'style' }, { role: 'annotation' } ],
                    ['Copper', 8.94, '#b87333', 'Cu' ],
                    ['Silver', 10.49, 'silver', 'Ag' ],
                    ['Gold', 19.30, 'gold', 'Au' ],
                    ['Platinum', 21.45, 'color: #e5e4e2', 'Pt' ]
                ]);
        }

        // Garante que os gráficos sejam redesenhados e se ajustem se o usuário redimensionar a janela
        window.addEventListener('resize', desenharGraficos);
    </script>
</body>
</html>
